<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0" />

    <base href="/" />

    <title>GrowLogic - En Maintenance</title>
    <meta
      name="description"
      content="Site web en maintenance, on revient vite." />
    <meta
      name="keywords"
      content="IOT, intelligence artificielle, alerte arrosage, capteurs humidité et température, diagnostic plante, assistance jardinage, entretien plantes, plante d intérieur" />
    <meta
      name="robots"
      content="noindex, follow" />

    <link
      rel="preconnect"
      href="https://fonts.googleapis.com" />
    <link
      rel="preconnect"
      href="https://fonts.gstatic.com"
      crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700&family=Roboto+Condensed:wght@700&family=Roboto:wght@400;700&display=swap"
      rel="stylesheet" />

    <link
      rel="icon"
      type="image/x-icon"
      href="/favicon.ico" />
    <link
      rel="stylesheet"
      href="/maintenance.css" />

    <script
      type="module"
      src="https://unpkg.com/@dotlottie/player-component@latest/dist/dotlottie-player.mjs"></script>
  </head>
  <body>
    <main class="error-view">
      <h1
        id="h1"
        class="error-view__title text-background-effect">
        Une erreur est survenue.
      </h1>

      <h3
        id="h3-wrapper"
        class="error-view__code">
        <span id="h3">Erreur</span>
        <span class="error-view__code-value">503</span>
      </h3>

      <div class="error-view__content">
        <section class="maintenance-error">
          <div class="maintenance-error__content">
            <div class="maintenance-error__animation-wrapper">
              <dotlottie-player
                id="lottie"
                src="/assets/animations/maintenance-error-under-construction.lottie"
                background="transparent"
                speed="1"
                style="width: 100%; height: 100%"
                loop
                autoplay
                class="maintenance-error__lottie"
                aria-label="Une équipe technique s'affairant autour d'un écran en maintenance" />
            </div>

            <h4
              id="h4"
              class="maintenance-error__title">
              Casques obligatoires !
            </h4>

            <h5
              id="h5"
              class="maintenance-error__subtitle text-background-effect">
              On laisse sécher le code et on revient vite...
            </h5>
          </div>
        </section>
      </div>
    </main>

    <script src="/maintenance.js"></script>
  </body>
</html>
