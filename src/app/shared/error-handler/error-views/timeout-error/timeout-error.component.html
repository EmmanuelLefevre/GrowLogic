<section
  class="timeout-error"
  [class.is-ready]="isReady">
  <div class="timeout-error__content">
    <div class="timeout-error__animation-wrapper">
      <span class="sr-only">
        {{ 'PAGES.ERROR.TIMEOUT.IMG.ALT.SANDGLASS' | translate }}
      </span>

      <canvas
        #lottieCanvas
        aria-hidden="true"
        tabindex="-1"
        class="timeout-error__lottie">
      </canvas>
    </div>

    <h4 class="timeout-error__title">
      {{ 'PAGES.ERROR.TIMEOUT.TITLE' | translate }}
    </h4>

    <h5 class="timeout-error__subtitle">
      {{ 'PAGES.ERROR.TIMEOUT.SUBTITLE' | translate }}
    </h5>
  </div>
</section>
