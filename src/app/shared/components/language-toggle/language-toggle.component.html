<div class="lang-toggle">
  <button
    type="button"
    class="lang-toggle__btn"
    [class.lang-toggle__btn--active]="false"
    (click)="switchLanguage(toggleState().code)"
    [attr.aria-label]="toggleState().keys.aria | translate"
    [matTooltip]="toggleState().keys.tooltip | translate"
    matTooltipPosition="left"
    matTooltipShowDelay="200">
    <img
      [src]="toggleState().flagPath"
      alt=""
      class="lang-toggle__icon" />
  </button>
</div>
