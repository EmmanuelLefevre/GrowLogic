<div class="close">
  <button
    (click)="goBack()"
    type="button"
    [attr.aria-label]="'UI.BUTTONS.CLOSE.ARIA' | translate"
    [matTooltip]="'UI.BUTTONS.CLOSE.TOOLTIP' | translate"
    matTooltipPosition="right"
    matTooltipShowDelay="1000"
    class="close__action">
    <fa-icon
      [icon]="faCircleXmark"
      class="close__icon" />
  </button>
</div>
